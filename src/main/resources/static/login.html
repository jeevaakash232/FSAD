<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sync Engine</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">⚡</div>
                SyncEngine
            </div>
            <h2>Welcome back</h2>
            <p class="auth-sub">Sign in to your account</p>

            <div class="alert" id="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
    <script>
        // If already logged in, redirect
        fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/index.html'; });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await res.json();
            if (res.ok) {
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/index.html', 800);
            } else {
                showAlert(data.error || 'Login failed', 'error');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + type;
        }
    </script>
</body>
</html>
