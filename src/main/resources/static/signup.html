<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Sync Engine</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">⚡</div>
                SyncEngine
            </div>
            <h2>Create account</h2>
            <p class="auth-sub">Start monitoring in seconds</p>

            <div class="alert" id="alert"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email:    document.getElementById('email').value,
                    password: password
                })
            });

            const data = await res.json();
            if (res.ok) {
                showAlert('Account created! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/login.html', 1200);
            } else {
                showAlert(data.error || 'Signup failed', 'error');
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + type;
        }
    </script>
</body>
</html>
